<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" width="360" height="100" role="img" aria-label="TeachBack AI">
  <title>TeachBack AI</title>
  <desc>Full TeachBack AI logo: rounded cyan mark with the wordmark “TeachBack” in white and “AI” in cyan, set in Sora.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Sora:wght@600;700&display=swap');
      .tb-wm {
        font-family: 'Sora', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        font-weight: 700;
        font-size: 44px;
        letter-spacing: -0.6px;
      }
    ]]></style>
  </defs>
  <!-- Mark -->
  <g transform="translate(8, 18)">
    <rect x="0" y="0" width="64" height="64" rx="16" ry="16"
          fill="rgba(0,229,255,0.06)"
          stroke="#00E5FF"
          stroke-opacity="0.55"
          stroke-width="1.5" />
    <g stroke="#00E5FF" stroke-width="5" stroke-linecap="round" fill="none">
      <line x1="15" y1="22" x2="45" y2="22" />
      <line x1="15" y1="32" x2="38" y2="32" />
      <line x1="15" y1="42" x2="30" y2="42" />
    </g>
  </g>
  <!-- Wordmark -->
  <text x="92" y="66" class="tb-wm">
    <tspan fill="#FFFFFF">TeachBack</tspan><tspan fill="#00E5FF"> AI</tspan>
  </text>
</svg>
